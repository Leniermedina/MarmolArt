<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarmolArt - Galería</title>
    <style>
        /* ===== VARIABLES ===== */
        :root {
            --color-fondo: #f9f6f2;
            --color-texto: #333;
            --color-primario: #b89e7b;
            --color-secundario: #6b4f3a;
            --color-blanco: #ffffff;
            --color-negro: #111;
            --sombra: 0 10px 30px rgba(0, 0, 0, 0.1);
            --borde-radio: 8px;
            --transicion: 0.3s ease;
            --fuente-principal: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --max-width: 1200px;
            --marmol-texture: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="1" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.05"/></svg>');
        }

        body.dark-mode {
            --color-fondo: #1e1e1e;
            --color-texto: #f0f0f0;
            --color-primario: #a88b68;
            --color-secundario: #c0a080;
            --sombra: 0 10px 30px rgba(255, 255, 255, 0.05);
        }

        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--fuente-principal);
            background-color: var(--color-fondo);
            color: var(--color-texto);
            line-height: 1.6;
            transition: background-color var(--transicion), color var(--transicion);
            background-image: var(--marmol-texture);
            background-repeat: repeat;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        ul {
            list-style: none;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ===== HEADER ===== */
        header {
            background-color: var(--color-blanco);
            box-shadow: var(--sombra);
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: background-color var(--transicion);
        }

        body.dark-mode header {
            background-color: #2a2a2a;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
        }

        .logo h1 {
            font-size: 1.8rem;
            color: var(--color-primario);
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            font-weight: 500;
            transition: color var(--transicion);
        }

        .nav-links a:hover {
            color: var(--color-primario);
        }

        .theme-lang {
            display: flex;
            gap: 10px;
        }

        .theme-lang button {
            background: none;
            border: 1px solid var(--color-primario);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color var(--transicion), transform var(--transicion);
        }

        .theme-lang button:hover {
            background-color: var(--color-primario);
            color: var(--color-blanco);
            transform: scale(1.1);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background-color: var(--color-texto);
            margin: 3px 0;
            transition: var(--transicion);
        }

        /* ===== FOOTER ===== */
        footer {
            background-color: var(--color-negro);
            color: white;
            text-align: center;
            padding: 20px 0;
        }

        body.dark-mode footer {
            background-color: #111;
        }

        /* ===== PÁGINA GALERÍA ===== */
        .page-header {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('../images/hero1.jpg') no-repeat center/cover;
            color: white;
            text-align: center;
            padding: 100px 0;
            margin-bottom: 50px;
        }

        .page-header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 60px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: var(--borde-radio);
            box-shadow: var(--sombra);
            cursor: pointer;
            transition: transform var(--transicion);
        }

        .gallery-item:hover {
            transform: scale(1.02);
        }

        .gallery-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-item .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px;
            transform: translateY(100%);
            transition: transform 0.3s;
        }

        .gallery-item:hover .overlay {
            transform: translateY(0);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .nav-links {
                position: fixed;
                top: 80px;
                left: -100%;
                width: 100%;
                height: calc(100vh - 80px);
                background-color: var(--color-blanco);
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 40px;
                transition: left 0.3s;
                z-index: 999;
            }

            body.dark-mode .nav-links {
                background-color: #2a2a2a;
            }

            .nav-links.active {
                left: 0;
            }

            .hamburger {
                display: flex;
            }

            .hamburger.active span:nth-child(1) {
                transform: rotate(45deg) translate(5px, 5px);
            }
            .hamburger.active span:nth-child(2) {
                opacity: 0;
            }
            .hamburger.active span:nth-child(3) {
                transform: rotate(-45deg) translate(7px, -6px);
            }

            .page-header h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1 data-i18n="site_name">MarmolArt</h1>
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html" data-i18n="nav_home">Inicio</a></li>
                    <li><a href="galeria.html" data-i18n="nav_gallery">Galería</a></li>
                    <li><a href="contacto.html" data-i18n="nav_contact">Contacto</a></li>
                </ul>
            </nav>
            <div class="theme-lang">
                <button id="theme-toggle" aria-label="Cambiar tema">🌙</button>
                <button id="lang-toggle" aria-label="Cambiar idioma">🇬🇧</button>
            </div>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <main>
        <section class="page-header">
            <div class="container">
                <h1 data-i18n="gallery_title">Nuestros trabajos</h1>
                <p data-i18n="gallery_subtitle">Selección de proyectos realizados con mármol de alta calidad.</p>
            </div>
        </section>

        <section class="gallery">
            <div class="container">
                <div class="gallery-grid" id="gallery-grid">
                    <!-- Las imágenes se cargarán dinámicamente con JS -->
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p data-i18n="footer_text">&copy; 2025 MarmolArt. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/galeria.js"></script>
</body>
</html>
